<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do'a & Ijazah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <div class="max-w-2xl mx-auto py-8 px-4">
        <a href="index.html" class="inline-block mb-6 text-emerald-700 hover:underline font-bold">&larr; Kembali</a>
        <h1 class="text-3xl font-bold mb-4 text-emerald-800">Do'a & Ijazah</h1>
        <div class="space-y-6" id="doa-list">
            <!-- Doa/Ijazah akan di-generate di sini -->
        </div>
        <button id="saveBtn" class="mt-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-6 rounded shadow"></button>
    </div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz_tivmXFcFYiRDFNdptORrkdifdKzFlBmFaTb387uA5xn7dx4CE9_1KVaMaQNEkDR4Xw/exec?sheet=Sheet2";
const doaList = document.getElementById('doa-list');
let doaData = [
    {judul: "", isi: ""},
    {judul: "", isi: ""}
];

// Render semua doa/ijazah
function renderDoa() {
    doaList.innerHTML = "";
    doaData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = "bg-white rounded-xl shadow p-5";
        div.innerHTML = `
            <label class="block text-sm font-semibold text-slate-600 mb-1">Do'a / Ijazah:</label>
            <div contenteditable="true" class="judul border border-slate-300 rounded px-3 py-2 min-h-[2.5rem] focus:outline-none focus:ring-2 focus:ring-emerald-400 mb-3" data-idx="${idx}" placeholder="Tulis judul atau keterangan di sini...">${item.judul}</div>
            <label class="block text-sm font-semibold text-slate-600 mb-1">Keterangan isi Do'a / Ijazah :</label>
            <div contenteditable="true" class="isi border border-slate-300 rounded px-3 py-2 min-h-[4rem] focus:outline-none focus:ring-2 focus:ring-emerald-400" data-idx="${idx}" placeholder="Tulis isi do'a atau ijazah di sini...">${item.isi}</div>
        `;
        doaList.appendChild(div);
    });
    // Event listener untuk update data saat diedit
    document.querySelectorAll('.judul').forEach(el => {
        el.oninput = e => {
            doaData[el.dataset.idx].judul = el.innerText;
        };
    });
    document.querySelectorAll('.isi').forEach(el => {
        el.oninput = e => {
            doaData[el.dataset.idx].isi = el.innerText;
        };
    });
}

// Ambil data dari Google Sheets Sheet2 saat halaman dibuka
fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    if (Array.isArray(data) && data.length > 0) {
      doaData = data.map(row => ({
        judul: row[0] || "",
        isi: row[1] || ""
      }));
      renderDoa();
    } else {
      renderDoa();
    }
  });

// Tombol tambah doa/ijazah
document.getElementById('addBtn').onclick = function() {
    doaData.push({judul: "", isi: ""});
    renderDoa();
};

// Tombol simpan
document.getElementById('saveBtn').onclick = function() {
  // Ambil data terbaru dari DOM
  document.querySelectorAll('.judul').forEach(el => {
    doaData[el.dataset.idx].judul = el.innerText;
  });
  document.querySelectorAll('.isi').forEach(el => {
    doaData[el.dataset.idx].isi = el.innerText;
  });
  // Siapkan data untuk dikirim
  const data = doaData.map(item => [item.judul, item.isi]);
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data),
    headers: {"Content-Type": "application/json"}
  })
  .then(res => res.text())
  .then(txt => alert("Berhasil disimpan!"));
};
</script>
</body>
</html>
